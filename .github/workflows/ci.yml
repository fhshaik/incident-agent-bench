name: CI
on: [push, pull_request]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: {python-version: "3.12"}
      - run: make install
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make benchmark

