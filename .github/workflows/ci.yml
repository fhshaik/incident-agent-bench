name: CI
on: [push, pull_request]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.1.0
        with: {python-version: "3.12", enable-cache: true}
      - run: make install
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make benchmark
      - run: uv build
